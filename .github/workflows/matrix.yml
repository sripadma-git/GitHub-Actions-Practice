name: Matrix Build Workflow

on: push 

jobs:
  test-matrix:
    runs-on : ${{ matrix.os}}

    strategy:
        matrix:
          os: [ubuntu-latest]
          python-version: ["3.8", "3.11" , "3.13"]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setp-python@v5
        with:
          python-version: ${{ matrix.python-version}}

      - name: print python version
        run: python --version