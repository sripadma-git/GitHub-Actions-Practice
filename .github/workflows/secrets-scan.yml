name: secrets scan 

on:
    workflow_call:


jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: run Gitleaks scanner 
              uses: gitleaks/gitleaks-action@v1
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
