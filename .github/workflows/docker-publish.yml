name: Docker Build & Push1

on:
  push:
    branches:
      - main
      - feature/**   # optional for testing

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/github-actions-app:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/github-actions-app:sha-${{ env.SHORT_SHA }} .

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/github-actions-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/github-actions-app:sha-${{ env.SHORT_SHA }}